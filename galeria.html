<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleção - Sobrecarnal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="pagina-galeria">

    <a href="#" id="btn-voltar" style="color: #900; text-decoration: none; font-family: 'Cinzel', serif;">← Voltar ao Sacrifício</a>
    
    <h1 style="margin-top: 20px;">Arquivos de Sobrecarnal</h1>
    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
    
    <div id="grid-colecao" class="grid-colecao">
        </div>

    <div id="visualizador">
        <img id="imagem-grande" src="" alt="Ampliado">
        <button id="btn-play-dialogo">▶</button>
        <div id="dialogo-container">
            <p id="texto-dialogo"></p>
            <span id="seta-proximo">▼</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('grid-colecao');
            const visualizador = document.getElementById('visualizador');
            const imagemGrande = document.getElementById('imagem-grande');
            const btnVoltar = document.getElementById('btn-voltar');
            const btnPlay = document.getElementById('btn-play-dialogo');
            const dialogoBox = document.getElementById('dialogo-container');
            const textoBox = document.getElementById('texto-dialogo');

            const dialogosRecompensa10 = [
                "???: *Choro apertado*",
                "Polícia: Senhora? A senhora está bem? O que aconteceu?",
                "???: Não… não era ela… não era uma mulher…",
                "Polícia: Como não era? O que a senhora viu?",
                "???: Ela… os olhos…  e as mãos… não era! Eu… eu me escondi... me escondi debaixo da mesa.",
                "Polícia: Mantenha a calma, me diga devagar. Essa pessoa ainda está aí?",
                "???: Ela... Ela fez na minha frente...",
                "Polícia: Senhora, preciso que colabore conosco.",
                "???: Ela… ela comeu ela… inteira…",
                "Polícia: Comeu?",
                "???: Comeu inteira e depois foi embora."
            ];

            let indiceDialogo = 0;
            let typingInterval;
            let isTyping = false;
            let textoAtual = "";

            function typeText(text) {
                textoBox.innerText = "";
                textoAtual = text;
                isTyping = true;
                let i = 0;
                clearInterval(typingInterval);
                typingInterval = setInterval(() => {
                    textoBox.innerText += text.charAt(i);
                    i++;
                    if (i >= text.length) {
                        clearInterval(typingInterval);
                        isTyping = false;
                    }
                }, 30);
            }
            
            function carregarGaleria() {
                const colecao = JSON.parse(localStorage.getItem('imagensDesbloqueadas')) || [];
                grid.innerHTML = ''; // Limpa a grade antes de recriar

                if (colecao.length === 0) {
                    grid.innerHTML = "<p style='opacity:0.5; font-family: sans-serif; grid-column: 1 / -1; text-align: center; width: 100%;'>Nenhum fragmento coletado ainda. Volte e clique no olho.</p>";
                } else {
                    colecao.forEach(caminho => {
                        const img = document.createElement('img');
                        img.src = caminho;
                        img.className = 'item-galeria';
                        
                        img.addEventListener('click', () => {
                            imagemGrande.src = caminho;
                            visualizador.style.display = 'flex';
                            
                            // Resetar estados
                            dialogoBox.style.display = 'none';
                            imagemGrande.classList.remove('zoomed'); // Reseta o zoom ao abrir
                            clearInterval(typingInterval);

                            // Verifica se é a recompensa 10 para mostrar o play
                            if (caminho.includes('recompensa10.png')) {
                                btnPlay.style.display = 'block';
                                imagemGrande.classList.remove('zoomavel');
                            } else {
                                btnPlay.style.display = 'none';
                                imagemGrande.classList.add('zoomavel');
                            }
                        });

                        grid.appendChild(img);
                    });
                }
            }

            carregarGaleria(); // Carrega ao abrir

            // Ouve o aviso do jogo para atualizar a lista
            window.addEventListener('message', (event) => {
                if (event.data === 'atualizarGaleria') carregarGaleria();
            });

            // Zoom na imagem
            imagemGrande.addEventListener('click', (e) => {
                if (imagemGrande.classList.contains('zoomavel')) {
                    e.stopPropagation(); // Impede que feche o visualizador
                    
                    if (imagemGrande.classList.contains('zoomed')) {
                        imagemGrande.classList.remove('zoomed');
                    } else {
                        const rect = imagemGrande.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        imagemGrande.style.transformOrigin = `${(x / rect.width) * 100}% ${(y / rect.height) * 100}%`;
                        imagemGrande.classList.add('zoomed');
                    }
                }
            });

            // Botão Play
            btnPlay.addEventListener('click', (e) => {
                e.stopPropagation(); // Não fechar o visualizador
                btnPlay.style.display = 'none';
                dialogoBox.style.display = 'block';
                indiceDialogo = 0;
                typeText(dialogosRecompensa10[0]);
            });

            // Avançar Diálogo
            dialogoBox.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isTyping) {
                    clearInterval(typingInterval);
                    textoBox.innerText = textoAtual;
                    isTyping = false;
                } else {
                    indiceDialogo++;
                    if (indiceDialogo < dialogosRecompensa10.length) {
                        typeText(dialogosRecompensa10[indiceDialogo]);
                    } else {
                        dialogoBox.style.display = 'none';
                        btnPlay.style.display = 'block'; // Mostra o play de novo ao terminar
                    }
                }
            });

            visualizador.addEventListener('click', () => {
                visualizador.style.display = 'none';
                dialogoBox.style.display = 'none';
                clearInterval(typingInterval);
            });

            btnVoltar.addEventListener('click', (e) => {
                e.preventDefault();
                if (window.self !== window.top) {
                    window.parent.postMessage('fecharGaleria', '*');
                } else {
                    window.location.href = 'game.html';
                }
            });
        });
    </script>
</body>
</html>
